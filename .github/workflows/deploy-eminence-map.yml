name: Deploy Eminence planning map

on:
  push:
    branches: [main]
    paths:
      - "eminence-planning-map/**"
      - ".github/workflows/deploy-eminence-map.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: eminence-pages
  cancel-in-progress: false

jobs:
  publish-branch:
    name: Publish gh-pages branch
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Verify static site bundle
        run: |
          set -euo pipefail
          test -f eminence-planning-map/index.html
          test -f eminence-planning-map/app.js
          test -f eminence-planning-map/layers.json
          test -f eminence-planning-map/data/city-boundary.geojson
          test -f eminence-planning-map/data/parcels.geojson
          test -f eminence-planning-map/.nojekyll
          test ! -e eminence-planning-map/package.json

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./eminence-planning-map
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Deployment notes
        run: |
          {
            echo "## Eminence map published"
            echo ""
            echo "Static files are on the \`gh-pages\` branch."
            echo ""
            echo "### One-time setup (required)"
            echo "1. Open **Settings → Pages**"
            echo "2. **Build and deployment → Source:** Deploy from a branch"
            echo "3. **Branch:** \`gh-pages\` / \`/ (root)\` → Save"
            echo ""
            echo "Site: https://awest813.github.io/maplibre-gl-js/"
          } >> "$GITHUB_STEP_SUMMARY"
